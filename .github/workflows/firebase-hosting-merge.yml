name: Deploy to Firebase Hosting on merge

on:
  push:
    branches: [master]
  workflow_dispatch: {} # lets you trigger a deploy manually after setting the secret

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter founder build

      # Service-account auth. The old FIREBASE_TOKEN approach is deprecated and
      # was failing every run with "Failed to authenticate" (empty secret). Set
      # the FIREBASE_SERVICE_ACCOUNT_LEAD_PILOT_1FFE3 repo secret to the
      # service-account JSON for this to work.
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LEAD_PILOT_1FFE3 }}
          channelId: live
          projectId: lead-pilot-1ffe3
